{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — CBC Mizzou</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'landing/images/favicon.svg' %}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #000 0%, #1a1a1a 50%, #2a2a2a 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      background: linear-gradient(135deg, #F1B82D, #f5ce5e, #D4A574);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    p { color: #9ca3af; font-size: 1rem; margin-bottom: 2rem; max-width: 28rem; }
    .btn {
      display: inline-block;
      background: #F1B82D;
      color: #000;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn:hover { background: #D4A128; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBC Mizzou — Exec Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-brand h1 {
      font-size: 1.25rem;
      font-weight: 700;
    }
    .login-brand h1 span { color: #F1B82D; }
    .login-brand p {
      font-size: 0.8125rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 0.375rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #F1B82D;
    }
    .login-btn {
      width: 100%;
      padding: 0.625rem;
      background: #F1B82D;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #D4A128; }
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8125rem;
      margin-bottom: 1rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: #6b7280;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #F1B82D; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <h1><span>CBC</span> Mizzou</h1>
      <p>Exec Dashboard</p>
    </div>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    <a href="/" class="back-link">← Back to site</a>
  </div>
</body>
</html>
